<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting EFC - Cantera de Héroes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --efc-orange: #f37021; --efc-green: #008f39; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 15px; color: white; }

        /* Barra de herramientas */
        .toolbar { width: 100%; max-width: 500px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .btn-download { background: var(--efc-green); color: white; padding: 12px 40px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; font-size: 16px; text-transform: uppercase; width: 100%; }
        .setup-zone { background: #333; padding: 10px; border-radius: 10px; font-size: 12px; text-align: center; width: 100%; border: 1px dashed var(--efc-orange); }

        /* Cancha */
        #canvas-wrapper { width: 100%; max-width: 500px; position: relative; }
        #canvas-container { position: relative; width: 100%; aspect-ratio: 500 / 720; background-color: #1a4d2e; border: 5px solid #fff; border-radius: 12px; overflow: hidden; }

        /* Escudo y Título */
        #club-logo { position: absolute; top: 2.5%; right: 3.5%; width: 18%; height: auto; z-index: 25; display: none; }
        #team-title { position: absolute; top: 4.5%; width: 100%; text-align: center; color: #fff; font-size: 26px; font-weight: 900; text-transform: uppercase; text-shadow: 0 3px 6px #000; z-index: 10; outline: none; box-sizing: border-box; padding: 0 60px; }

        /* Líneas de campo */
        .pitch-line { position: absolute; border: 2.5px solid rgba(255,255,255,0.4); pointer-events: none; }
        #half-line { width: 100%; top: 50%; border-top: 2.5px solid rgba(255,255,255,0.4); }
        #center-circle { width: 30%; aspect-ratio: 1; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #area-top { width: 56%; height: 16%; top: -2px; left: 50%; transform: translateX(-50%); border-top: none; }
        #area-bottom { width: 56%; height: 16%; bottom: -2px; left: 50%; transform: translateX(-50%); border-bottom: none; }

        /* Jugadores */
        .player-unit { position: absolute; text-align: center; width: 24%; transform: translate(-50%, -50%); z-index: 5; }
        .dot { width: 30px; height: 30px; background: var(--efc-orange); border: 2.5px solid #fff; border-radius: 50%; margin: 0 auto 6px auto; }
        .gk .dot { background: #f1c40f; }
        .name-box { background: rgba(0,0,0,0.85); padding: 5px; border-radius: 8px; width: 110%; border: 1.5px solid rgba(255,255,255,0.2); }
        .starter { color: #fff; font-size: 16px; font-weight: 800; display: block; outline: none; }
        .sub { color: #00ff6a; font-size: 12px; font-style: italic; display: block; border-top: 1px solid rgba(255,255,255,0.3); margin-top: 4px; outline: none; }

        /* Posiciones */
        #pos-GK { top: 92%; left: 50%; } #pos-DFI { top: 78%; left: 18%; } #pos-DFC1 { top: 81%; left: 39%; } #pos-DFC2 { top: 81%; left: 61%; } #pos-DFD { top: 78%; left: 82%; } #pos-MCD1 { top: 63%; left: 36%; } #pos-MCD2 { top: 63%; left: 64%; } #pos-MI { top: 43%; left: 18%; } #pos-MCO { top: 46%; left: 50%; } #pos-MD { top: 43%; left: 82%; } #pos-DC { top: 22%; left: 50%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div id="setup-ui" class="setup-zone">
            <p>Configura el escudo por única vez para que sea permanente:</p>
            <input type="file" id="logo-input" accept="image/*" onchange="saveLogoPermanently(event)">
        </div>
        <button class="btn-download" onclick="saveImage()">Descargar</button>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container">
            <img id="club-logo" src="">
            <div id="team-title" contenteditable="true">ENVIGADO FC</div>
            <div class="pitch-line" id="half-line"></div>
            <div class="pitch-line" id="center-circle"></div>
            <div class="pitch-line" id="area-top"></div>
            <div class="pitch-line" id="area-bottom"></div>
            <div id="players-on-pitch"></div>
        </div>
    </div>

    <script>
        const posiciones = [
            {id: 'GK', class: 'gk', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFI', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFC1', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFC2', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFD', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCD1', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCD2', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MI', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCO', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MD', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DC', class: '', t: 'TITULAR', s: 'SUPLENTE'}
        ];

        // Cargar logo guardado al iniciar
        window.onload = () => {
            const savedLogo = localStorage.getItem('efc_logo_permanent');
            if (savedLogo) {
                const img = document.getElementById('club-logo');
                img.src = savedLogo;
                img.style.display = 'block';
                document.getElementById('setup-ui').style.display = 'none';
            }
            
            const pitchDiv = document.getElementById('players-on-pitch');
            posiciones.forEach(p => {
                pitchDiv.innerHTML += `
                    <div class="player-unit ${p.class}" id="pos-${p.id}">
                        <div class="dot"></div>
                        <div class="name-box">
                            <span class="starter" contenteditable="true">${p.t}</span>
                            <span class="sub" contenteditable="true">${p.s}</span>
                        </div>
                    </div>`;
            });
        };

        function saveLogoPermanently(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                const base64String = reader.result;
                localStorage.setItem('efc_logo_permanent', base64String);
                location.reload(); // Recarga para aplicar
            };
            reader.readAsDataURL(file);
        }

        function saveImage() {
            const container = document.getElementById("canvas-container");
            const team = document.getElementById('team-title').innerText;
            html2canvas(container, { scale: 3, useCORS: true, backgroundColor: "#1a4d2e" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Nomina_${team.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
