        #pos-MCD2 { top: 63%; left: 64%; }

        #pos-MCO { top: 46%; left: 50%; }

<body>

    <div id="controls">
        <h2>Análisis de Nómina</h2>
        
        <div style="margin-bottom: 20px;">
            <label class="pos-label">Equipo / Categoría</label>
            <input type="text" id="in-team" placeholder="Ej: ENVIGADO FC - SUB 17" onkeyup="sync()">
        </div>

        <div id="inputs-container"></div>

        <button class="download-btn" onclick="saveImage()">⬇️ Descargar</button>
    </div>

    <div id="canvas-container">
        <div id="team-title">EQUIPO</div>
        <div class="pitch-line" id="half-line"></div>
        <div class="pitch-line" id="center-circle"></div>
        <div class="pitch-line" id="area-top"></div>
        <div class="pitch-line" id="area-bottom"></div>

        <div id="players-on-pitch"></div>
    </div>

    <script>
        const posiciones = [
            {id: 'GK', label: 'Portero', class: 'gk'},
            {id: 'DFI', label: 'Lateral Izq', class: ''},
            {id: 'DFC1', label: 'Central Izq', class: ''},
            {id: 'DFC2', label: 'Central Der', class: ''},
            {id: 'DFD', label: 'Lateral Der', class: ''},
            {id: 'MCD1', label: 'Pivote 1', class: ''},
            {id: 'MCD2', label: 'Pivote 2', class: ''},
            {id: 'MI', label: 'Volante Izq', class: ''},
            {id: 'MCO', label: 'Enganche', class: ''},
            {id: 'MD', label: 'Volante Der', class: ''},
            {id: 'DC', label: 'Delantero', class: ''}
        ];

        const inputsDiv = document.getElementById('inputs-container');
        const pitchDiv = document.getElementById('players-on-pitch');

        posiciones.forEach(p => {
            inputsDiv.innerHTML += `
                <div class="pos-row">
                    <span class="pos-label">${p.label}</span>
                    <input type="text" id="tit-${p.id}" placeholder="Titular" onkeyup="sync()">
                    <input type="text" id="sup-${p.id}" placeholder="Suplente" onkeyup="sync()">
                </div>
            `;
            pitchDiv.innerHTML += `
                <div class="player-unit ${p.class}" id="pos-${p.id}">
                    <div class="dot"></div>
                    <div class="name-box">
                        <span class="starter" id="lbl-tit-${p.id}">-</span>
                        <span class="sub" id="lbl-sup-${p.id}"></span>
                    </div>
                </div>
            `;
        });

        function sync() {
            document.getElementById('team-title').innerText = document.getElementById('in-team').value || "EQUIPO";
            posiciones.forEach(p => {
                const t = document.getElementById('tit-' + p.id).value;
                const s = document.getElementById('sup-' + p.id).value;
                document.getElementById('lbl-tit-' + p.id).innerText = t || "-";
                document.getElementById('lbl-sup-' + p.id).innerText = s ? s : "";
            });
        }

        function saveImage() {
            const container = document.getElementById("canvas-container");
            const team = document.getElementById('in-team').value || 'analisis';
            
            html2canvas(container, { 
                scale: 3, 
                useCORS: true,
                backgroundColor: null 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Nomina_${team.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
