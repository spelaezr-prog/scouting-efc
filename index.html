<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scouting EFC - Cantera de Héroes</title>
    
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/en/thumb/5/52/Envigado_FC_logo.svg/1200px-Envigado_FC_logo.svg.png">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --efc-orange: #f37021; --efc-green: #008f39; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: #121212; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            color: white;
        }

        .toolbar {
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .btn-download { 
            background: var(--efc-green); 
            color: white; 
            padding: 12px 40px; 
            border: none; 
            border-radius: 50px; 
            font-weight: 900; 
            cursor: pointer; 
            font-size: 15px; 
            text-transform: uppercase; 
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 143, 57, 0.4);
        }

        .setup-zone { 
            background: #222; 
            padding: 10px; 
            border-radius: 10px; 
            font-size: 11px; 
            text-align: center; 
            width: 100%; 
            border: 1px dashed var(--efc-orange);
            box-sizing: border-box;
        }

        #canvas-wrapper { width: 100%; max-width: 500px; position: relative; }
        
        #canvas-container { 
            position: relative; 
            width: 100%; 
            aspect-ratio: 500 / 720; 
            background-color: #1a4d2e; 
            border: 5px solid #fff; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }

        /* Líneas del campo */
        .pitch-line { position: absolute; border: 2.5px solid rgba(255,255,255,0.4); pointer-events: none; }
        #half-line { width: 100%; top: 50%; border-top: 2.5px solid rgba(255,255,255,0.4); }
        #center-circle { width: 30%; aspect-ratio: 1; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #area-top { width: 56%; height: 16%; top: -2px; left: 50%; transform: translateX(-50%); border-top: none; }
        #area-bottom { width: 56%; height: 16%; bottom: -2px; left: 50%; transform: translateX(-50%); border-bottom: none; }

        #club-logo { 
            position: absolute; 
            top: 2.5%; 
            right: 3.5%; 
            width: 17%; 
            height: auto; 
            z-index: 25; 
            display: none;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
        }
        
        #team-title { 
            position: absolute; 
            top: 4%; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 24px; 
            font-weight: 900; 
            text-transform: uppercase; 
            text-shadow: 0 4px 8px #000; 
            z-index: 10; 
            outline: none; 
            box-sizing: border-box; 
            padding: 0 65px;
        }

        /* Jugadores - FUENTES REDUCIDAS */
        .player-unit { position: absolute; text-align: center; width: 23%; transform: translate(-50%, -50%); z-index: 5; }
        .dot { 
            width: 26px; 
            height: 26px; 
            background: var(--efc-orange); 
            border: 2.5px solid #fff; 
            border-radius: 50%; 
            margin: 0 auto 5px auto; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
        }
        .gk .dot { background: #f1c40f; }
        
        .name-box { 
            background: rgba(0,0,0,0.85); 
            padding: 4px; 
            border-radius: 7px; 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.2); 
        }

        .starter { 
            color: #fff; 
            font-size: 14px; /* Bajado de 17px */
            font-weight: 800; 
            display: block; 
            outline: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub { 
            color: #00ff6a; 
            font-size: 10px; /* Bajado de 13px */
            font-style: italic; 
            display: block; 
            border-top: 1px solid rgba(255,255,255,0.3); 
            margin-top: 3px; 
            padding-top: 2px;
            outline: none;
            min-height: 12px;
        }

        [contenteditable="true"]:focus { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* Posiciones Espaciadas */
        #pos-GK   { top: 92%; left: 50%; }
        #pos-DFI  { top: 74%; left: 14%; } 
        #pos-DFC1 { top: 83%; left: 34%; } 
        #pos-DFC2 { top: 83%; left: 66%; } 
        #pos-DFD  { top: 74%; left: 86%; } 
        #pos-MCD1 { top: 58%; left: 35%; } 
        #pos-MCD2 { top: 58%; left: 65%; } 
        #pos-MI   { top: 36%; left: 14%; } 
        #pos-MCO  { top: 40%; left: 50%; } 
        #pos-MD   { top: 36%; left: 86%; } 
        #pos-DC   { top: 16%; left: 50%; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div id="setup-ui" class="setup-zone">
            <p>Configura el escudo por última vez:</p>
            <input type="file" id="logo-input" accept="image/*" onchange="saveLogoPermanently(event)">
        </div>
        <button class="btn-download" onclick="saveImage()">Descargar</button>
    </div>

    <div id="canvas-wrapper">
        <div id="canvas-container">
            <img id="club-logo" src="">
            <div id="team-title" contenteditable="true">ENVIGADO FC</div>
            <div class="pitch-line" id="half-line"></div>
            <div class="pitch-line" id="center-circle"></div>
            <div class="pitch-line" id="area-top"></div>
            <div class="pitch-line" id="area-bottom"></div>
            <div id="players-on-pitch"></div>
        </div>
    </div>

    <script>
        const posiciones = [
            {id: 'GK', class: 'gk', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFI', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFC1', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFC2', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DFD', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCD1', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCD2', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MI', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MCO', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'MD', class: '', t: 'TITULAR', s: 'SUPLENTE'},
            {id: 'DC', class: '', t: 'TITULAR', s: 'SUPLENTE'}
        ];

        window.onload = () => {
            const savedLogo = localStorage.getItem('efc_logo_permanent');
            if (savedLogo) {
                const img = document.getElementById('club-logo');
                img.src = savedLogo;
                img.style.display = 'block';
                document.getElementById('setup-ui').style.display = 'none';
            }
            
            const pitchDiv = document.getElementById('players-on-pitch');
            posiciones.forEach(p => {
                pitchDiv.innerHTML += `
                    <div class="player-unit ${p.class}" id="pos-${p.id}">
                        <div class="dot"></div>
                        <div class="name-box">
                            <span class="starter" contenteditable="true">${p.t}</span>
                            <span class="sub" contenteditable="true">${p.s}</span>
                        </div>
                    </div>`;
            });
        };

        function saveLogoPermanently(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                localStorage.setItem('efc_logo_permanent', reader.result);
                location.reload();
            };
            reader.readAsDataURL(file);
        }

        function saveImage() {
            const container = document.getElementById("canvas-container");
            const team = document.getElementById('team-title').innerText;
            html2canvas(container, { 
                scale: 3, 
                useCORS: true, 
                backgroundColor: "#1a4d2e" 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Nomina_${team.replace(/\s+/g, '_')}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
